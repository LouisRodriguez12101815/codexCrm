services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codexcrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codexcrm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_BASE_URL: http://localhost:3000
      COOKIE_SECURE: "false"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/codexcrm
      DEMO_EMAIL: demo@codexcrm.local
      DEMO_PASSWORD: codexcrm-demo
      DEMO_SESSION_SECRET: change-me-for-local-compose
      TWILIO_ENABLED: "false"
      SMS_ENABLED: "false"
      CALLS_ENABLED: "false"
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_FROM_NUMBER: +15555550100
      PGSSLMODE: disable
    ports:
      - "3000:3000"
    command: sh -c "npm run db:setup && npm run db:seed && npm run start"

volumes:
  postgres_data:
